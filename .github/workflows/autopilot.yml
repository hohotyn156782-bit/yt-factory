name: autopilot

# YT Factory: US-YouTube завод (документалки + Shorts). Времена UTC.
#   Пн/Ср/Пт 09:00 UTC → long   : документалка 10-12 мин
#   ежедневно 15:00 UTC → shorts : вертикальный Short
# До прохождения аудита YouTube API публикация идёт мостом: карточка в TG владельцу,
# файл видео — артефактом рана (ссылка в карточке). YT_AUTO=1 в SECRETS_ENV включит
# прямой автопостинг ТОЛЬКО после аудита (иначе видео навсегда блокируются в private).
# Крон включён 2026-07-13 (первая ручная проверка пройдена: CI-ран собрал short и документалку,
# обе карточки дошли до TG). До аудита YouTube API работает мост: видео → TG, выкладка руками.

on:
  workflow_dispatch:
    inputs:
      output:
        description: "выход: long | shorts"
        required: true
        default: "long"
      niche:
        description: "ниша (пусто = все подходящие формата)"
        required: false
        default: ""
  schedule:
    - cron: "0 9 * * 1,3,5"       # long   (Пн/Ср/Пт)
    - cron: "0 15 * * *"          # shorts (ежедневно)

concurrency:
  group: autopilot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 170
    permissions:
      contents: write   # commit-back state/ (история тем/cooldowns/курсор)
    env:
      PYTHONUNBUFFERED: "1"
      CF_DATA_ROOT: ${{ github.workspace }}/state/cfdata
      CF_NO_YTDLP: "1"          # yt-dlp виснет на IP GitHub (бот-капча) — отключаем на CI
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Установить ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Python-зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Кэш модели Kokoro (353МБ — не перекачивать каждый ран)
        uses: actions/cache@v4
        with:
          path: state/cfdata/cache/kokoro
          key: kokoro-v1.0
      - name: Записать секреты
        env:
          SECRETS_ENV: ${{ secrets.SECRETS_ENV }}
        run: |
          mkdir -p ~/.config/yt-factory
          printf '%s' "$SECRETS_ENV" > ~/.config/yt-factory/secrets.env
      - name: Выбрать выход (по cron-времени или вручную)
        id: pick
        env:
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_OUT: ${{ github.event.inputs.output }}
        run: |
          case "$SCHEDULE" in
            "0 9 * * 1,3,5")  OUT=long ;;
            "0 15 * * *")     OUT=shorts ;;
            *)                OUT="$INPUT_OUT" ;;
          esac
          echo "out=$OUT" >> "$GITHUB_OUTPUT"
          echo "Выход: $OUT"
      - name: Собрать и опубликовать/поставить в мост
        env:
          OUT: ${{ steps.pick.outputs.out }}
          NICHE: ${{ github.event.inputs.niche }}
        run: |
          mkdir -p "$CF_DATA_ROOT"
          python3 factory.py run "$OUT" $NICHE
      - name: Артефакт — видео/обложка/описание для ручной выкладки (мост до аудита)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ steps.pick.outputs.out }}-${{ github.run_id }}
          path: |
            state/cfdata/publish/*.mp4
            state/cfdata/output/*/POST.txt
            state/cfdata/output/*/thumb.jpg
            state/cfdata/output/*/subs.srt
          retention-days: 14
          if-no-files-found: warn
      - name: Сохранить состояние (история тем/cooldowns/курсор) — коммит-бэк с ретраем
        if: always()
        run: |
          git config user.email "autopilot@yt-factory"
          git config user.name "yf-autopilot"
          if [ -z "$(git status --porcelain state/ 2>/dev/null)" ]; then
            echo "state/ без изменений — коммитить нечего"; exit 0
          fi
          git add state/
          git commit -m "state: история тем+курсор [skip ci]" || { echo "нечего коммитить"; exit 0; }
          ok=""
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin master && git push origin master && { ok=1; break; }
            echo "push попытка $i не удалась, повтор через 5с"; sleep 5
          done
          if [ -z "$ok" ]; then
            echo "::error::коммит-бэк state/ не удался после 5 попыток"
            exit 1
          fi
      - name: Алерт в TG при падении джобы
        if: failure()
        env:
          SECRETS_ENV: ${{ secrets.SECRETS_ENV }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OUT: ${{ steps.pick.outputs.out }}
        run: |
          mkdir -p ~/.config/yt-factory
          printf '%s' "$SECRETS_ENV" > ~/.config/yt-factory/secrets.env
          python3 - <<'PY'
          import os, core, reporter
          core.load_local_secrets()
          reporter.critical(f"🛑 CI yt-factory УПАЛ · выход={os.environ.get('OUT','?')}\n{os.environ.get('RUN_URL','')}")
          PY
